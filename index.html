<style>
  :root{
    --bg: #15111E;
    --surface: #1E1830;
    --surface-2: #251D3C;
    --border: rgba(232,163,61,0.16);
    --border-soft: rgba(255,255,255,0.07);
    --text: #F2EEF9;
    --text-dim: #A79BC4;
    --text-faint: #6F6589;
    --gold: #E8A33D;
    --gold-deep: #B97A1F;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body{
    display:flex;
    justify-content:center;
    min-height:100vh;
    padding:0;
  }
  .phone{
    width:100%;
    max-width:420px;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    display:flex;
    flex-direction:column;
  }
  .serif{font-family:'Cormorant Garamond', serif;}

  .top{
    padding:28px 24px 8px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .top .date{
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-faint);
  }
  .top .brand{
    font-size:13px;
    letter-spacing:0.14em;
    color:var(--gold);
    text-transform:uppercase;
  }

  .greeting{
    padding:6px 24px 0;
  }
  .greeting h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-size:26px;
    line-height:1.25;
    color:var(--text);
  }
  .greeting span{color:var(--gold);}

  /* card da carta */
  .card-wrap{
    padding:22px 24px 0;
    display:flex;
    justify-content:center;
  }
  .flame-card{
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    padding:30px 20px 26px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .flame-svg{
    width:54px;
    height:74px;
    margin:0 auto 14px;
    display:block;
  }
  .flame-core{
    transform-origin:50% 85%;
    animation:flicker 3.2s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{ transform:scaleY(1) scaleX(1); }
    25%{ transform:scaleY(1.04) scaleX(0.97); }
    50%{ transform:scaleY(0.97) scaleX(1.03); }
    75%{ transform:scaleY(1.02) scaleX(0.99); }
  }
  .arc-label{
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin-bottom:10px;
  }
  .arc-nome{
    font-family:'Cormorant Garamond', serif;
    font-size:24px;
    font-weight:600;
    color:var(--text);
    margin-bottom:8px;
  }
  .arc-sub{
    font-size:13px;
    color:var(--text-dim);
    line-height:1.5;
  }

  .social-proof{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:14px 24px 0;
    font-size:12px;
    color:var(--text-faint);
  }
  .social-proof svg{flex-shrink:0;}

  .leitura{
    padding:18px 24px 0;
  }
  .leitura p{
    font-size:14.5px;
    line-height:1.75;
    color:var(--text-dim);
  }

  .blocked{
    margin:16px 24px 0;
    border-radius:14px;
    border:1px solid var(--border-soft);
    background:var(--surface);
    position:relative;
    overflow:hidden;
    padding:16px 18px;
  }
  .blocked-text{
    font-size:13.5px;
    line-height:1.7;
    color:var(--text-faint);
    filter:blur(3.5px);
    user-select:none;
    pointer-events:none;
  }
  .blocked-overlay{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    background:linear-gradient(180deg, rgba(30,24,48,0.35), rgba(30,24,48,0.75));
  }
  .blocked-overlay svg{width:18px;height:18px;color:var(--text-dim);}
  .blocked-overlay span{
    font-size:11.5px;
    letter-spacing:0.06em;
    color:var(--text-dim);
    text-transform:uppercase;
  }

  .cta-main{
    margin:20px 24px 0;
  }
  .cta-main button{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:none;
    background:var(--gold);
    color:#241705;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    font-weight:600;
    cursor:pointer;

  }

  .cta-main button:active{ transform:scale(0.98); }
  .cta-main .via{
    text-align:center;
    font-size:11.5px;
    color:var(--text-faint);
    margin-top:8px;
    letter-spacing:0.02em;
  }

  .cta-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:18px 24px 0;
  }
  .cta-row-single{

  }
  .cta-row-single button{

    align-items:center;
    justify-content:center;
    gap:8px;
    padding:14px 16px;
    font-size:13px;
  }

    width:18px;height:18px;
    margin:0;
    flex-shrink:0;
  }
  .cta-row button{
    background:var(--surface);

    border-radius:12px;
    padding:14px 8px;
    color:var(--text-dim);

    font-size:11.8px;
    line-height:1.4;
    cursor:pointer;
    transition:border-color 0.15s ease, color 0.15s ease;
  }
  .cta-row button:hover{
    border-color:var(--border);
    color:var(--text);
  }
  .cta-row svg{
    width:18px;height:18px;
    display:block;
    margin:0 auto 6px;
  }

  .foot{
    margin-top:auto;
    padding:30px 24px 26px;
    text-align:center;
  }
  .foot button{
    background:none;
    border:none;
    color:var(--text-faint);
    font-size:11.5px;
    text-decoration:underline;
    text-decoration-color:var(--border-soft);
    cursor:pointer;
    letter-spacing:0.02em;
  }

    .flame-core{ animation:none; }
  }
</style>

  function formatarData(d){
    var meses = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
    return d.getDate() + " de " + meses[d.getMonth()];
  }

  // hash determinístico simples a partir de uma string de data, garante que
  // todo visitante no mesmo dia veja o mesmo arquétipo (efeito manada real)
  function hashDia(str){
    var h = 0;
    for (var i = 0; i < str.length; i++){
      h = (h << 5) - h + str.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }

  function numeroSocialPara(hash){
    // gera um número "estável" de pessoas para o dia, entre 1800 e 4600

    document.getElementById("arcSub").textContent = a.curso;
    document.getElementById("leituraCurta").textContent = a.curta;
    document.getElementById("leituraBloqueada").textContent = a.bloqueada;
    document.getElementById("ctaVia").textContent = "fale com um terapeuta credenciado";

    var pessoas = numeroSocialPara(hash + index);
    document.getElementById("socialProof").textContent = pessoas.toLocaleString("pt-BR") + " pessoas tiraram esse mesmo arcano hoje";

    document.getElementById("btnDesbloquear").onclick = function(){
      alert("No diretório, selecione o filtro \"Terapeuta Holística\" para ver os profissionais credenciados nessa especialidade.");
      window.open(URL_DIRETORIO_ATH, "_blank");
    };
  }

  document.getElementById("btnAprender").onclick = function(){
    window.open(URL_TERAPEUTA_ESOTERICO, "_blank");
  };
  document.getElementById("btnNovaLeitura").onclick = function(){
    var proximo = (arquetipoAtualIndex + 1) % ARQUETIPOS.length;
    renderArquetipo(proximo);
  };

  renderArquetipo();
</script>

</body>
</html>
